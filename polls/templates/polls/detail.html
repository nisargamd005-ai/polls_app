{% extends "polls/base.html" %}

{% block content %}
<form action="{% url 'polls:vote' question.id %}" method="post">
    {% csrf_token %}
    <fieldset>
        <legend>
            <h2 style="margin-bottom: 20px;">{{ question.question_text }}</h2>
        </legend>
        {% if error_message %}<p class="error"><strong>{{ error_message }}</strong></p>{% endif %}
        {% for choice in question.choice_set.all %}
        <div class="choice-wrapper" onclick="document.getElementById('choice{{ forloop.counter }}').click();">
            <input type="radio" name="choice" id="choice{{ forloop.counter }}" value="{{ choice.id }}">
            <label for="choice{{ forloop.counter }}">{{ choice.choice_text }}</label>
        </div>
        {% endfor %}
    </fieldset>
    <button type="submit" class="btn">Vote</button>
</form>
{% endblock %}
